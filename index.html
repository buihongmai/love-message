<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A message for you</title>

<style>

body{
background:linear-gradient(135deg,#ffd6e7,#ffeef5);
font-family:Arial;
text-align:center;
margin-top:80px;
overflow:hidden;
}

h1{
color:#ff4d88;
}

input{
padding:10px;
margin:8px;
border-radius:8px;
border:1px solid #ddd;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff4d88;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff2e73;
}

#kq{
margin-top:40px;
font-size:22px;
color:#333;
width:60%;
margin-left:auto;
margin-right:auto;
line-height:1.6;
}

.heart{
position:fixed;
bottom:-10px;
font-size:20px;
animation:bay 6s linear infinite;
opacity:0.7;
}

@keyframes bay{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}

</style>

</head>

<body>

<h1>💌 Trả lời vài câu hỏi nhỏ nhé</h1>

<p>Tên của bạn</p>
<input id="ten">

<p>Bạn thích điều gì?</p>
<input id="st">

<p>Bạn đang ở đâu?</p>
<input id="no">

<br><br>

<button onclick="tan()">Xem tin nhắn</button>

<p id="kq"></p>

<script>

function tan(){

let ten=document.getElementById("ten").value
let st=document.getElementById("st").value
let no=document.getElementById("no").value

let message=`${ten} à...

Giữa thế giới rộng lớn này,
mình lại chú ý đến một điều rất nhỏ:
đó là bạn thích ${st}.

Không biết ở ${no}
có ngày nào mình được cùng bạn
đi dạo, trò chuyện
và cùng nhau tận hưởng
những điều giản dị đó không?

Thật ra...
người gửi link này
đã muốn nói chuyện với bạn từ lâu rồi. ❤️`

typeWriter(message)

}

function typeWriter(text){

let i=0
let speed=40
let output=""

function typing(){

if(i<text.length){
output+=text.charAt(i)
document.getElementById("kq").innerText=output
i++
setTimeout(typing,speed)
}

}

typing()

}

function createHeart(){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"
heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(15+Math.random()*20)+"px"

document.body.appendChild(heart)

setTimeout(()=>{heart.remove()},6000)

}

setInterval(createHeart,500)

</script>

</body>
</html>
